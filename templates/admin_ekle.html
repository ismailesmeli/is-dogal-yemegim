{% extends "layout.html" %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto; background: #f9f9f9; padding: 30px; border-radius: 15px;">
    <h2 style="color: #2d5a27;">Yeni Ürün Ekle</h2>
    <form method="POST">
        <label>Ürün Adı:</label><br>
        <input type="text" name="ad" required style="width: 100%; margin-bottom: 15px;"><br>
        
        <label>Fiyat (Örn: 500 TL):</label><br>
        <input type="text" name="fiyat" required style="width: 100%; margin-bottom: 15px;"><br>
        
        <label>Resim Linki (URL):</label><br>
        <input type="text" name="resim" style="width: 100%; margin-bottom: 15px;"><br>
        
        <label>WhatsApp Mesajı (Kısa):</label><br>
        <input type="text" name="mesaj" required style="width: 100%; margin-bottom: 20px;"><br>
        
        <button type="submit" style="width: 100%; padding: 15px; background: #2d5a27; color: white; border: none; border-radius: 5px; cursor: pointer;">
            Ürünü Dükkana Ekle
        </button>
    </form>
</div>
{% endblock %}
