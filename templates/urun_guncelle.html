{% extends "layout.html" %}

{% block content %}
<div class="update-container">
    <h2 class="form-title">🛒 Ürün Güncelleme: <span style="color: #e67e22;">{{ urun.ad }}</span></h2>

    <form action="{{ url_for('urun_guncelle', id=urun.id) }}" method="POST" enctype="multipart/form-data" class="update-form">
        
        <div class="form-group">
            <label>Ürün Adı</label>
            <input type="text" name="ad" value="{{ urun.ad }}" required class="form-input">
        </div>

        <div class="form-group">
            <label>Fiyat (TL)</label>
            <input type="text" name="fiyat" value="{{ urun.fiyat }}" required class="form-input">
        </div>

        <div class="form-group">
            <label>Ürün Fotoğrafı (Sürükle veya Seç)</label>
            <div id="drop-area" class="drop-zone">
                <div class="drop-content">
                    <i class="upload-icon">☁️</i>
                    <p>Fotoğrafı buraya sürükle veya tıkla</p>
                    <input type="file" name="resim_dosya" id="fileElem" accept="image/*" onchange="handleFiles(this.files)" style="display:none">
                </div>
                <div id="gallery" class="preview-gallery">
                    <img src="{{ urun.resim }}" id="preview-img" style="max-width: 100%; border-radius: 10px;">
                </div>
            </div>
            <input type="hidden" name="resim" value="{{ urun.resim }}">
        </div>

        <button type="submit" class="save-btn">DEĞİŞİKLİKLERİ KAYDET</button>
        <a href="{{ url_for('admin_dashboard') }}" class="cancel-link">Vazgeç ve Dön</a>
    </form>
</div>

<style>
/* Tasarım Ayarları */
.update-container { max-width: 600px; margin: 40px auto; padding: 20px; font-family: sans-serif; }
.form-title { text-align: center; color: #2d5a27; margin-bottom: 30px; }
.update-form { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
.form-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; outline: none; }

/* Sürükle-Bırak Stili */
.drop-zone {
    border: 2px dashed #2d5a27;
    border-radius: 15px;
    padding: 20px;
    text-align: center;
    background: #fdfaf5;
    cursor: pointer;
    transition: 0.3s;
}
.drop-zone:hover { background: #f0f7ef; border-color: #e67e22; }
.upload-icon { font-size: 40px; display: block; margin-bottom: 10px; }
.preview-gallery img { margin-top: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

/* Butonlar */
.save-btn {
    width: 100%; background: #2d5a27; color: white; border: none; padding: 15px; 
    border-radius: 50px; cursor: pointer; font-size: 1.1rem; font-weight: bold; transition: 0.3s;
}
.save-btn:hover { background: #1e3d1a; transform: scale(1.02); }
.cancel-link { display: block; text-align: center; margin-top: 15px; color: #777; text-decoration: none; font-size: 0.9rem; }
</style>

<script>
// Tıklama ile dosya seçme
const dropArea = document.getElementById('drop-area');
const fileElem = document.getElementById('fileElem');

dropArea.onclick = () => fileElem.click();

function handleFiles(files) {
    const file = files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('preview-img').src = e.target.result;
        }
        reader.readAsDataURL(file);
    }
}

// Sürükle-Bırak Efektleri
['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
    dropArea.addEventListener(eventName, preventDefaults, false);
});

function preventDefaults (e) {
    e.preventDefault();
    e.stopPropagation();
}

dropArea.addEventListener('drop', (e) => {
    let dt = e.dataTransfer;
    let files = dt.files;
    fileElem.files = files; // Dosyayı inputa ata
    handleFiles(files);
}, false);
</script>
{% endblock %}
