{% extends "layout.html" %}

{% block content %}
<div style="max-width: 600px; margin: 40px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); color: #333;">
    <h2 style="color: #2d5a27; text-align: center; margin-bottom: 20px;">📦 Siparişinizi Tamamlayın</h2>
    
    <div style="background: #fdfaf5; padding: 15px; border-radius: 10px; margin-bottom: 25px; border: 1px dashed #2d5a27;">
        <h4 style="margin: 0 0 10px 0;">Sipariş Özeti:</h4>
        <p style="font-size: 0.9rem; color: #555;">{{ sepet_ozeti }}</p>
    </div>

    <form id="whatsappForm">
        <div style="margin-bottom: 15px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Ad Soyad</label>
            <input type="text" id="ad" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Telefon</label>
            <input type="tel" id="tel" placeholder="05xx..." required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;">
        </div>

        <div style="margin-bottom: 20px;">
            <label style="display: block; font-weight: bold; margin-bottom: 5px;">Açık Adres</label>
            <textarea id="adres" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; height: 100px;"></textarea>
        </div>

        <button type="button" onclick="siparisVer()" style="width: 100%; background: #25D366; color: white; padding: 18px; border: none; border-radius: 50px; font-weight: bold; font-size: 1.1rem; cursor: pointer; transition: 0.3s;">
            WhatsApp ile Siparişi Onayla 🚀
        </button>
    </form>
</div>

<script>
function siparisVer() {
    const ad = document.getElementById('ad').value;
    const tel = document.getElementById('tel').value;
    const adres = document.getElementById('adres').value;
    const ozet = "{{ sepet_ozeti }}";

    if(!ad || !tel || !adres) {
        alert("Lütfen tüm alanları doldurun patron!");
        return;
    }

    const mesaj = `Merhaba *is doğal yemeğim*,\n\n*YENİ SİPARİŞ PLANI*\n----------------------\n*Ürünler:* ${ozet}\n\n*Müşteri Bilgileri:*\n👤 *İsim:* ${ad}\n📞 *Tel:* ${tel}\n📍 *Adres:* ${adres}\n\nSiparişim için onay bekliyorum.`;
    
    const whatsappUrl = `https://wa.me/905510465380?text=${encodeURIComponent(mesaj)}`;
    window.location.href = whatsappUrl;
}
</script>
{% endblock %}
