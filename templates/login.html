{% extends "layout.html" %}

{% block content %}
<div style="max-width: 350px; margin: 80px auto; padding: 30px; border: 2px solid #2d5a27; border-radius: 15px; background: #f9f9f9; text-align: center;">
    <h2 style="color: #2d5a27; margin-bottom: 20px;">Yönetici Girişi</h2>
    <form method="POST">
        <input type="text" name="username" placeholder="Kullanıcı Adı" required 
               style="width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #ccc;">
        <br>
        <input type="password" name="password" placeholder="Şifre" required 
               style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 5px; border: 1px solid #ccc;">
        <br>
        <button type="submit" style="width: 100%; padding: 12px; background: #2d5a27; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">
            Giriş Yap
        </button>
    </form>
</div>
{% endblock %}
